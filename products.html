<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VURA — المنتجات</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { font-family: 'Cairo', sans-serif; }
    body { background: linear-gradient(180deg, #ecfffc 0%, #ffffff 52%, #e8fdfb 100%); min-height: 100vh; }
    .card { transition: transform 0.25s ease, box-shadow 0.25s ease; }
    .card:hover { transform: translateY(-6px); box-shadow: 0 24px 48px -14px rgba(64, 224, 208, 0.38); border-color: rgba(64,224,208,.55); }
  </style>
</head>
<body class="text-slate-900 antialiased" data-vura-meta="meta_title_products">

  <nav class="sticky top-0 z-40 border-b-2 border-[#40E0D0] bg-white/92 backdrop-blur-md shadow-[0_10px_40px_-16px_rgba(64,224,208,0.4)]">
    <div class="container mx-auto px-4 md:px-8 py-3.5 flex items-center justify-between">
      <a href="index.html" class="flex items-center shrink-0" data-i18n-aria="aria_home">
        <img src="logo.jpeg" alt="VURA" width="150" height="45" class="h-10 md:h-11 w-auto max-w-[min(190px,48vw)] object-contain object-right" />
      </a>
      <div class="hidden md:flex items-center gap-4 lg:gap-6">
        <div class="flex items-center gap-8 font-bold text-slate-800">
          <a href="index.html" class="hover:text-teal-700 transition"><span data-i18n="nav_home">الرئيسية</span></a>
          <a href="products.html" class="text-teal-700"><span data-i18n="nav_products">المنتجات</span></a>
          <a href="login.html" class="hover:text-teal-700 transition"><span data-i18n="nav_distributor">تسجيل دخول الموزع</span></a>
        </div>
        <div class="flex items-center rounded-full border border-teal-200 bg-white p-0.5 gap-0.5 shadow-sm" role="group" data-i18n-aria="lang_group_aria">
          <button type="button" class="vura-lang-btn px-2 py-1 rounded-full text-xs font-bold text-slate-600 hover:bg-teal-50" data-vura-lang="ar">AR</button>
          <button type="button" class="vura-lang-btn px-2 py-1 rounded-full text-xs font-bold text-slate-600 hover:bg-teal-50" data-vura-lang="fr">FR</button>
          <button type="button" class="vura-lang-btn px-2 py-1 rounded-full text-xs font-bold text-slate-600 hover:bg-teal-50" data-vura-lang="en">EN</button>
        </div>
        <a href="verify.html" class="inline-flex items-center gap-2 rounded-full border-2 border-[#0c2748] bg-teal-50/90 px-3 py-2 lg:px-4 text-xs lg:text-sm font-bold text-[#0c2748] shadow-sm hover:bg-teal-100 transition shrink-0" data-i18n-title="title_scan_qr">
          <i class="fas fa-qrcode"></i>
          <span class="hidden lg:inline" data-i18n="nav_verify_long">التحقق من المنتجات الأصلية</span>
          <span class="lg:hidden" data-i18n="nav_verify_short">تحقق الأصالة</span>
        </a>
      </div>
      <button type="button" id="menuBtn" class="md:hidden text-slate-800 text-xl p-2 rounded-lg hover:bg-teal-50" data-i18n-aria="aria_menu"><i class="fas fa-bars"></i></button>
    </div>
    <div id="mobileMenu" class="hidden md:hidden border-t-2 border-[#40E0D0]/70 bg-white px-6 py-4 flex flex-col gap-3 font-bold shadow-[0_12px_40px_-20px_rgba(64,224,208,0.35)]">
      <div class="flex rounded-full border border-teal-200 bg-teal-50/50 p-0.5 gap-1 mb-1" role="group" data-i18n-aria="lang_group_aria">
        <button type="button" class="vura-lang-btn flex-1 py-2 rounded-full text-sm font-bold text-slate-600" data-vura-lang="ar">AR</button>
        <button type="button" class="vura-lang-btn flex-1 py-2 rounded-full text-sm font-bold text-slate-600" data-vura-lang="fr">FR</button>
        <button type="button" class="vura-lang-btn flex-1 py-2 rounded-full text-sm font-bold text-slate-600" data-vura-lang="en">EN</button>
      </div>
      <a href="index.html"><span data-i18n="nav_home">الرئيسية</span></a>
      <a href="products.html" class="text-teal-700"><span data-i18n="nav_products">المنتجات</span></a>
      <a href="login.html"><span data-i18n="nav_distributor">تسجيل دخول الموزع</span></a>
      <a href="verify.html" class="flex items-center justify-center gap-2 rounded-full border-2 border-[#0c2748] bg-teal-50 py-3 font-bold text-[#0c2748]">
        <i class="fas fa-qrcode"></i>
        <span data-i18n="nav_verify_long">التحقق من المنتجات الأصلية</span>
      </a>
    </div>
  </nav>

  <main class="container mx-auto px-4 md:px-8 py-10 md:py-14">
    <header class="max-w-2xl mb-10 md:mb-12">
      <h1 class="text-3xl md:text-4xl font-black text-[#0c2748]" data-i18n="products_header_title">منتجات التجميل والعناية والصحة</h1>
      <p class="mt-3 text-slate-600 leading-relaxed" data-i18n="products_header_sub">VURA منصة متخصصة في بيع منتجات التجميل الأصلية والمنتجات الصحية — البيانات أدناه للعرض فقط.</p>
    </header>
    <div id="product-grid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8"></div>
  </main>

  <footer class="border-t border-teal-100 bg-white/90 py-10 mt-12">
    <div class="container mx-auto px-4 md:px-8 flex flex-col sm:flex-row justify-between items-center gap-4 text-sm text-slate-700">
      <img src="logo.jpeg" alt="VURA" width="140" height="42" class="h-10 w-auto object-contain" />
      <div class="flex gap-6 font-semibold">
        <a href="verify.html" class="hover:text-teal-700"><span data-i18n="products_footer_verify">التحقق من الأصالة</span></a>
        <a href="index.html" class="hover:text-teal-700"><span data-i18n="nav_home">الرئيسية</span></a>
      </div>
    </div>
  </footer>

  <script src="products.js"></script>
  <script src="vura-i18n.js"></script>
  <script>
    function renderProductGrid() {
      var grid = document.getElementById('product-grid');
      if (!grid) return;
      grid.innerHTML = '';
      var lang = window.vuraGetLang();
      var loc = lang === 'fr' ? 'fr-FR' : lang === 'en' ? 'en-US' : 'ar-DZ';
      var cur = window.vuraCurrencyLabel(lang);
      var detailTxt = window.vuraT('products_detail', lang);
      var items = window.VURA_STORE_PRODUCTS || [];
      items.forEach(function (p) {
        var name = window.vuraProductName(p, lang);
        var card = document.createElement('a');
        card.href = 'product-detail.html?id=' + encodeURIComponent(p.id);
        card.className = 'card group block rounded-2xl border border-teal-100 bg-white overflow-hidden shadow-md shadow-teal-900/5 hover:border-[#40E0D0]/50';
        card.innerHTML =
          '<div class="aspect-[4/3] overflow-hidden bg-teal-50">' +
          '<img src="' + p.image + '" alt="" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">' +
          '</div>' +
          '<div class="p-5">' +
          '<h2 class="font-bold text-lg text-[#0c2748] group-hover:text-teal-800 transition line-clamp-2">' + name.replace(/</g, '&lt;') + '</h2>' +
          '<p class="mt-3 text-xl font-black text-teal-800">' + p.price.toLocaleString(loc) + ' <span class="text-sm font-bold vura-currency-mark">' + cur + '</span></p>' +
          '<span class="mt-4 inline-flex items-center gap-2 text-sm font-bold text-emerald-700">' + detailTxt + ' <i class="fas fa-chevron-left text-xs"></i></span>' +
          '</div>';
        grid.appendChild(card);
      });
    }

    document.addEventListener('DOMContentLoaded', function () {
      window.vuraInitI18n();
      renderProductGrid();
      window.addEventListener('vuraLangChange', function () {
        renderProductGrid();
      });
      document.getElementById('menuBtn').addEventListener('click', function () {
        document.getElementById('mobileMenu').classList.toggle('hidden');
      });
    });
  </script>
</body>
</html>
