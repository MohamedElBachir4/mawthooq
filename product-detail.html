<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VURA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>* { font-family: 'Cairo', sans-serif; } body { background: linear-gradient(180deg, #ecfffc 0%, #ffffff 58%, #e6faf8 100%); min-height: 100vh; }</style>
</head>
<body class="text-slate-900 antialiased">

  <nav class="sticky top-0 z-40 border-b-2 border-[#40E0D0] bg-white/92 backdrop-blur-md shadow-[0_10px_40px_-16px_rgba(64,224,208,0.4)]">
    <div class="container mx-auto px-4 md:px-8 py-3.5 flex items-center justify-between">
      <a href="index.html" class="flex items-center shrink-0" data-i18n-aria="aria_home">
        <img src="logo.jpeg" alt="VURA" width="150" height="45" class="h-10 md:h-11 w-auto max-w-[min(190px,48vw)] object-contain object-right" />
      </a>
      <div class="hidden md:flex items-center gap-4 lg:gap-6">
        <div class="flex items-center gap-6 lg:gap-8 font-bold text-slate-800">
          <a href="index.html" class="hover:text-teal-700 transition"><span data-i18n="nav_home">الرئيسية</span></a>
          <a href="products.html" class="text-teal-700"><span data-i18n="nav_products">المنتجات</span></a>
          <a href="login.html" class="hover:text-teal-700 transition"><span data-i18n="nav_distributor">تسجيل دخول الموزع</span></a>
        </div>
        <div class="flex items-center rounded-full border border-teal-200 bg-white p-0.5 gap-0.5 shadow-sm" role="group" data-i18n-aria="lang_group_aria">
          <button type="button" class="vura-lang-btn px-2 py-1 rounded-full text-xs font-bold text-slate-600 hover:bg-teal-50" data-vura-lang="ar">AR</button>
          <button type="button" class="vura-lang-btn px-2 py-1 rounded-full text-xs font-bold text-slate-600 hover:bg-teal-50" data-vura-lang="fr">FR</button>
          <button type="button" class="vura-lang-btn px-2 py-1 rounded-full text-xs font-bold text-slate-600 hover:bg-teal-50" data-vura-lang="en">EN</button>
        </div>
        <a href="verify.html" class="inline-flex items-center gap-2 rounded-full border-2 border-[#0c2748] bg-teal-50/90 px-3 py-2 lg:px-4 text-xs lg:text-sm font-bold text-[#0c2748] shadow-sm hover:bg-teal-100 transition shrink-0" data-i18n-title="title_scan_qr">
          <i class="fas fa-qrcode"></i>
          <span class="hidden lg:inline" data-i18n="nav_verify_long">التحقق من المنتجات الأصلية</span>
          <span class="lg:hidden" data-i18n="nav_verify_short">تحقق الأصالة</span>
        </a>
      </div>
      <button type="button" id="menuBtn" class="md:hidden text-slate-800 text-xl p-2 rounded-lg hover:bg-teal-50" data-i18n-aria="aria_menu"><i class="fas fa-bars"></i></button>
    </div>
    <div id="mobileMenu" class="hidden md:hidden border-t-2 border-[#40E0D0]/70 bg-white px-6 py-4 flex flex-col gap-3 font-bold shadow-[0_12px_40px_-20px_rgba(64,224,208,0.35)]">
      <div class="flex rounded-full border border-teal-200 bg-teal-50/50 p-0.5 gap-1 mb-1" role="group" data-i18n-aria="lang_group_aria">
        <button type="button" class="vura-lang-btn flex-1 py-2 rounded-full text-sm font-bold text-slate-600" data-vura-lang="ar">AR</button>
        <button type="button" class="vura-lang-btn flex-1 py-2 rounded-full text-sm font-bold text-slate-600" data-vura-lang="fr">FR</button>
        <button type="button" class="vura-lang-btn flex-1 py-2 rounded-full text-sm font-bold text-slate-600" data-vura-lang="en">EN</button>
      </div>
      <a href="index.html"><span data-i18n="nav_home">الرئيسية</span></a>
      <a href="products.html" class="text-teal-700"><span data-i18n="nav_products">المنتجات</span></a>
      <a href="login.html"><span data-i18n="nav_distributor">تسجيل دخول الموزع</span></a>
      <a href="verify.html" class="flex items-center justify-center gap-2 rounded-full border-2 border-[#0c2748] bg-teal-50 py-3 font-bold text-[#0c2748]">
        <i class="fas fa-qrcode"></i>
        <span data-i18n="nav_verify_long">التحقق من المنتجات الأصلية</span>
      </a>
    </div>
  </nav>

  <main class="container mx-auto px-4 md:px-8 py-10 md:py-14 max-w-5xl">
    <a href="products.html" class="inline-flex items-center gap-2 text-sm font-bold text-teal-700 hover:text-teal-900 mb-8">
      <i class="fas fa-arrow-right"></i> <span data-i18n="detail_back">العودة إلى المنتجات</span>
    </a>

    <div id="empty-state" class="hidden rounded-2xl border border-teal-200 bg-white p-12 text-center shadow-md">
      <p class="text-lg font-bold text-[#0c2748]" data-i18n="detail_not_found">المنتج غير موجود</p>
      <a href="products.html" class="mt-4 inline-block text-teal-700 font-bold underline"><span data-i18n="detail_view_all">عرض كل المنتجات</span></a>
    </div>

    <div id="detail-root" class="hidden grid lg:grid-cols-2 gap-10 lg:gap-14 items-start">
      <div class="rounded-2xl overflow-hidden border-2 border-[#40E0D0]/35 bg-white shadow-xl shadow-teal-900/8 ring-2 ring-[#40E0D0]/15">
        <img id="p-image" src="" alt="" class="w-full aspect-square object-cover">
      </div>
      <div>
        <h1 id="p-title" class="text-3xl md:text-4xl font-black text-[#0c2748] leading-tight"></h1>
        <p id="p-price" class="mt-4 text-3xl font-black text-teal-700"></p>
        <p id="p-desc" class="mt-6 text-slate-600 leading-relaxed"></p>

        <div class="mt-8 flex flex-wrap items-center gap-4">
          <label class="text-sm font-bold text-slate-800" data-i18n="detail_qty">الكمية</label>
          <div class="flex items-center rounded-full border-2 border-teal-200 bg-white overflow-hidden">
            <button type="button" id="qty-minus" class="px-4 py-2 text-teal-800 hover:bg-teal-50 font-bold text-lg">−</button>
            <input type="number" id="qty" value="1" min="1" max="99" class="w-14 text-center border-x border-teal-200 py-2 font-bold text-slate-900 outline-none bg-transparent">
            <button type="button" id="qty-plus" class="px-4 py-2 text-teal-800 hover:bg-teal-50 font-bold text-lg">+</button>
          </div>
        </div>

        <button type="button" id="add-cart" class="mt-8 w-full sm:w-auto rounded-full bg-gradient-to-l from-[#40E0D0] via-teal-600 to-emerald-800 text-[#082032] font-black px-10 py-4 text-lg shadow-[0_18px_48px_-12px_rgba(64,224,208,0.5)] hover:brightness-[1.05] transition flex items-center justify-center gap-3">
          <i class="fas fa-shopping-cart"></i>
          <span data-i18n="detail_add_cart">إضافة إلى السلة</span>
        </button>
        <p id="cart-toast" class="hidden mt-4 text-sm font-bold text-emerald-600 flex items-center gap-2"><i class="fas fa-check-circle"></i> <span data-i18n="detail_toast">تمت الإضافة (واجهة فقط — لا يوجد سلة حقيقية)</span></p>

        <a href="verify.html" class="mt-6 inline-flex items-center gap-2 text-sm font-bold text-cyan-800 hover:text-teal-900">
          <i class="fas fa-qrcode"></i>
          <span data-i18n="detail_verify_link">التحقق من أصالة منتج مشابه عبر QR</span>
        </a>
      </div>
    </div>
  </main>

  <script src="products.js"></script>
  <script src="vura-i18n.js"></script>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var id = params.get('id');
      var p = typeof window.vuraGetProductById === 'function' ? window.vuraGetProductById(id) : null;

      function syncProduct() {
        if (!p) return;
        var lang = window.vuraGetLang();
        document.title = 'VURA — ' + window.vuraProductName(p, lang);
        document.getElementById('p-image').src = p.image;
        document.getElementById('p-image').alt = window.vuraProductName(p, lang);
        document.getElementById('p-title').textContent = window.vuraProductName(p, lang);
        document.getElementById('p-price').innerHTML = window.vuraFormatPriceHTML(p.price, lang);
        document.getElementById('p-desc').textContent = window.vuraProductDesc(p, lang);
      }

      document.addEventListener('DOMContentLoaded', function () {
        window.vuraInitI18n();

        var menuBtn = document.getElementById('menuBtn');
        var mobileMenu = document.getElementById('mobileMenu');
        if (menuBtn && mobileMenu) {
          menuBtn.addEventListener('click', function () {
            mobileMenu.classList.toggle('hidden');
          });
          mobileMenu.querySelectorAll('a').forEach(function (link) {
            link.addEventListener('click', function () {
              mobileMenu.classList.add('hidden');
            });
          });
        }

        if (!p) {
          document.getElementById('empty-state').classList.remove('hidden');
          document.title = window.vuraT('meta_not_found');
          window.addEventListener('vuraLangChange', function () {
            document.title = window.vuraT('meta_not_found');
          });
          return;
        }

        document.getElementById('detail-root').classList.remove('hidden');
        syncProduct();
        window.addEventListener('vuraLangChange', syncProduct);

        var qtyInput = document.getElementById('qty');
        document.getElementById('qty-minus').addEventListener('click', function () {
          var v = parseInt(qtyInput.value, 10) || 1;
          qtyInput.value = Math.max(1, v - 1);
        });
        document.getElementById('qty-plus').addEventListener('click', function () {
          var v = parseInt(qtyInput.value, 10) || 1;
          qtyInput.value = Math.min(99, v + 1);
        });

        document.getElementById('add-cart').addEventListener('click', function () {
          var toast = document.getElementById('cart-toast');
          toast.classList.remove('hidden');
          setTimeout(function () { toast.classList.add('hidden'); }, 3500);
        });
      });
    })();
  </script>
</body>
</html>
